name: Deploy Scoreboard to GitHub Pages

on:
  # This tells GitHub to run the pipeline automatically every time you push code to main
  push:
    branches: ["main"]
  # Allows you to manually trigger the deployment from the GitHub Actions tab if needed
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to avoid conflicting deployment states
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v4

      - name: Package Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire root directory (which contains index.html)
          path: '.'

      - name: Deploy to Live GitHub Pages Site
        id: deployment
        uses: actions/deploy-pages@v4